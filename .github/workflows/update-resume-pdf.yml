name: Update resume PDF

on:
  push:
    branches: [main]
    paths:
      - resume.html
      - resume/**
      - tools/render-resume-pdf.mjs
      - package.json
      - package-lock.json
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: resume-pdf-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-noto-cjk fonts-noto-color-emoji

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Render PDF
        run: npm run resume:pdf

      - name: Verify PDF is 1 page (AI Role)
        run: |
          pages="$(pdfinfo assets/resume-ai.pdf | awk '/^Pages:/ {print $2}')"
          echo "Pages: ${pages}"
          test "${pages}" = "1"

      - name: Commit and push if changed
        run: |
          resume_files=(assets/resume*.pdf)
          changes="$(git status --porcelain --untracked-files=all -- "${resume_files[@]}")"

          if [ -z "${changes}" ]; then
            echo "Resume PDFs unchanged; skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${resume_files[@]}"
          git commit -m "chore(resume): update PDF"
          git push
