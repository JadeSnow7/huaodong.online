name: Deploy static site

on:
  push:
    branches: [main]
    paths:
      - index.html
      - resume.html
      - styles.css
      - assets/**
      - notes/**
      - essays/**
      - styles/**
      - scripts/**
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-static-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "DEPLOY_SSH_KEY secret is required."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 106.54.188.236 >> ~/.ssh/known_hosts

      - name: Assemble deploy bundle
        run: |
          stage_dir="${RUNNER_TEMP}/site"
          mkdir -p "${stage_dir}"

          cp index.html resume.html styles.css "${stage_dir}/"
          cp -R assets notes essays styles scripts "${stage_dir}/"

          echo "Prepared bundle:"
          find "${stage_dir}" -maxdepth 2 -type f | sort

      - name: Ensure remote directory exists
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 22 ubuntu@106.54.188.236 \
            "mkdir -p /var/www/huaodong.online"

      - name: Sync files to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 22" \
            "${RUNNER_TEMP}/site/" \
            "ubuntu@106.54.188.236:/var/www/huaodong.online/"
